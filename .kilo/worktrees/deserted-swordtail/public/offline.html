<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline — Abis Farm Market ERP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { 'bh-red': '#C0392B' } } }
        }
    </script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">
    <div class="text-center max-w-sm">
        <div class="w-20 h-20 bg-bh-red rounded-2xl flex items-center justify-center
                    mx-auto mb-6 shadow-lg">
            <span class="text-white font-bold text-3xl">B</span>
        </div>
        <h1 class="text-2xl font-bold text-gray-800 mb-2">You're Offline</h1>
        <p class="text-gray-500 mb-6 text-sm leading-relaxed">
            No internet connection detected. If you were already using the POS,
            go back — it should still work offline.
        </p>

        <div class="space-y-3">
            <button onclick="window.history.back()"
                    class="w-full py-3 bg-bh-red hover:bg-red-700 text-white
                           font-medium rounded-xl transition-colors">
                ← Go Back
            </button>
            <button onclick="window.location.reload()"
                    class="w-full py-3 border border-gray-200 text-gray-600
                           font-medium rounded-xl hover:bg-gray-100 transition-colors">
                Try Again
            </button>
        </div>

        <p class="text-xs text-gray-400 mt-6">
            Sales made while offline will sync automatically when you reconnect.
        </p>
    </div>

    <script>
        // Auto-reload when connection restores
        window.addEventListener('online', () => window.location.reload());
    </script>
</body>
</html>
